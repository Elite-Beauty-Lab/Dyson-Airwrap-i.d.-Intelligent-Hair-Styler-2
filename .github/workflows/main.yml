name: YouTube Smart Interaction Bot 2026

on:
  schedule:
    # تشغيل في أوقات غير منتظمة (مثلاً كل 45-50 دقيقة) لتجنب كشف النمط
    - cron: "7,37 * * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb libosmesa6 libgl1-mesa-glx

      - name: Install Python Packages
        run: |
          pip install undetected-chromedriver selenium-stealth selenium

      - name: Run Bot
        env:
          TARGET_URL: "رابط_فيديو_الخاص_بك"
          # يفضل وضع البروكسي هنا إذا كان لديك
          PROXY: ${{ secrets.PROXY }} 
        run: |
          # xvfb-run تضمن تشغيل المتصفح وكأن هناك شاشة حقيقية متصلة
          xvfb-run --server-args="-screen 0 1920x1080x24" python youtube_bot.py
