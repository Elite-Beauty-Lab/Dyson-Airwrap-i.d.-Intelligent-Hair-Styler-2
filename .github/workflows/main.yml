name: YouTube Traffic Bot Pro

on:
  schedule:
    - cron: "12,42 * * * *" # أوقات عشوائية قليلاً
  workflow_dispatch:

jobs:
  youtube-job:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # تثبيت البدائل الحديثة للمكتبات الرسومية في Ubuntu 24.04
          sudo apt-get install -y xvfb libgl1 libglx-mesa0 libegl1 libosmesa6

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Install Python Packages
        run: |
          pip install --upgrade pip
          pip install undetected-chromedriver selenium-stealth selenium

      - name: Run YouTube Bot
        env:
          TARGET_URL: ${{ secrets.VIDEO_URL }} # يفضل وضعه في Secrets
        run: |
          # تشغيل عبر شاشة افتراضية لتجاوز كشف الـ Headless
          xvfb-run --server-args="-screen 0 1920x1080x24" python youtube_bot.py
